<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --primary: #38bdf8;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: var(--card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 520px;
      width: 90%;
      animation: fadeIn 0.4s ease-in-out;
    }

    h1 {
      font-size: 72px;
      margin: 0;
      color: var(--primary);
    }

    h2 {
      margin: 10px 0 20px;
      font-weight: 500;
    }

    p {
      color: var(--muted);
      margin-bottom: 25px;
    }

    .path {
      background: #020617;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      color: #64748b;
      word-break: break-all;
      margin-bottom: 25px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: var(--primary);
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    a:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The file you're looking for doesn’t exist or may have been moved.</p>

    <!-- Optional: Inject path dynamically -->
    <div class="path">
      {{PATH}}
    </div>

    <a href="/">Go back home</a>
  </div>
</body>
</html>
